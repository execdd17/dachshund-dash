<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Dachshund Dash!</title>
<!-- Installable web app: full-screen when launched from the home screen -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dachshund Dash">
<meta name="theme-color" content="#87CEEB">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
<!-- Firebase SDK (compat builds for no-build-step usage) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<h1>DACHSHUND DASH</h1>
<div id="rotateOverlay">
  <span class="rotate-phone">&#x1F4F1;</span>
  <p>Rotate your phone to play!</p>
</div>
<div class="game-wrapper">
  <canvas id="game" width="1600" height="500"></canvas>
  <div id="nameEntryOverlay">
    <span class="prompt">Who's playing? Enter your name:</span>
    <input type="text" id="nameInput" maxlength="12" placeholder="Your name" />
    <div class="difficulty-row">
      <label for="difficultySlider">DIFFICULTY: <span id="difficultyValue">NORMAL &mdash; 3 HEARTS</span></label>
      <input type="range" id="difficultySlider" min="0" max="4" step="1" value="2" />
      <div class="difficulty-ends"><span>VERY EASY</span><span>VERY HARD</span></div>
    </div>
    <button type="button" id="nameSubmitBtn">Start</button>
  </div>
  <button type="button" id="customizeBtn">CUSTOMIZE</button>
  <div id="cosmeticsMenu">
    <div class="cosmetics-panel">
      <h2>CUSTOMIZE YOUR DOG</h2>
      <div class="cosmetics-preview">
        <canvas id="cosmeticsPreviewCanvas" width="284" height="128"></canvas>
      </div>
      <div class="cosmetics-tabs" id="cosmeticsTabs"></div>
      <div class="cosmetics-grid" id="cosmeticsGrid"></div>
      <button type="button" id="cosmeticsDoneBtn">DONE</button>
    </div>
  </div>
</div>
<p class="hint hint-desktop">SPACE / UP to jump (tap twice to double jump!) &mdash; DOWN / S to duck</p>
<div class="hint hint-mobile">
  <div class="hint-zone"><span class="hint-arrow">&#x2196;</span> hold left side to duck</div>
  <div class="hint-zone">tap right side to jump (tap twice to double jump!) <span class="hint-arrow">&#x2197;</span></div>
</div>
<div id="globalLeaderboard">
  <h2>GLOBAL LEADERBOARD</h2>
  <div class="lb-difficulty-tabs" id="lbDifficultyTabs"></div>
  <div class="lb-controls">
    <input type="text" class="lb-search" id="lbSearch" placeholder="Search by name..." maxlength="12" />
    <span class="lb-page-info" id="lbPageInfo"></span>
  </div>
  <table>
    <thead>
      <tr><th>#</th><th>NAME</th><th>SCORE</th></tr>
    </thead>
    <tbody id="lbBody"></tbody>
  </table>
  <div class="lb-pagination">
    <button id="lbPrev" disabled>&lt; PREV</button>
    <button id="lbNext" disabled>NEXT &gt;</button>
  </div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dachshund Dash!</title>
<link rel="stylesheet" href="css/style.css">
<!-- Firebase SDK (compat builds for no-build-step usage) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<h1>DACHSHUND DASH</h1>
<div class="game-wrapper">
  <canvas id="game" width="1600" height="500"></canvas>
  <div id="nameEntryOverlay">
    <span class="prompt">New high score! Enter your name:</span>
    <input type="text" id="nameInput" maxlength="12" placeholder="Your name" />
    <button type="button" id="nameSubmitBtn">Submit</button>
  </div>
  <button type="button" id="customizeBtn">CUSTOMIZE</button>
  <div id="cosmeticsMenu">
    <div class="cosmetics-panel">
      <h2>CUSTOMIZE YOUR DOG</h2>
      <div class="cosmetics-preview">
        <canvas id="cosmeticsPreviewCanvas" width="284" height="128"></canvas>
      </div>
      <div class="cosmetics-tabs" id="cosmeticsTabs"></div>
      <div class="cosmetics-grid" id="cosmeticsGrid"></div>
      <button type="button" id="cosmeticsDoneBtn">DONE</button>
    </div>
  </div>
</div>
<p class="hint hint-desktop">SPACE / UP to jump (tap twice to double jump!) &mdash; DOWN / S to duck</p>
<div class="hint hint-mobile">
  <div class="hint-zone"><span class="hint-arrow">&#x2196;</span> hold left side to duck</div>
  <div class="hint-zone">tap right side to jump (tap twice to double jump!) <span class="hint-arrow">&#x2197;</span></div>
</div>
<div id="globalLeaderboard">
  <h2>GLOBAL LEADERBOARD</h2>
  <div class="lb-controls">
    <input type="text" class="lb-search" id="lbSearch" placeholder="Search by name..." maxlength="12" />
    <span class="lb-page-info" id="lbPageInfo"></span>
  </div>
  <table>
    <thead>
      <tr><th>#</th><th>NAME</th><th>SCORE</th></tr>
    </thead>
    <tbody id="lbBody"></tbody>
  </table>
  <div class="lb-pagination">
    <button id="lbPrev" disabled>&lt; PREV</button>
    <button id="lbNext" disabled>NEXT &gt;</button>
  </div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
